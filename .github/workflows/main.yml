name: CI Docker Build and Push

on:
  pull_request:
    branches:
      - main  # Solo se dispara cuando el destino es main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USER_DOCKERHUB }}
          password: ${{ secrets.PASSWORD_DOCKERHUB }}

      - name: Construir y subir imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.USER_DOCKERHUB }}/Actividad-Pipeline-CI-CD-y-Arquitectura-Multinivel-en-AWS:latest